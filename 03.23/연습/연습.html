<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습</title>
    <link rel="stylesheet" href="style01.css">
</head>

<body>
    <header class="site-header">
        <div class="container flex-between">
            <div class="logo">Logo</div>
            <nav class="gnb flex-row">
                <a href="#" class="nav-item">menu1</a>
                <a href="#" class="nav-item">menu2</a>
                <a href="#" class="nav-item">menu3</a>
                <a href="#" class="nav-item">menu4</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container hero-inner flex-center">
            <div class="hero-text">
                <div class="label-box">Hero Title</div>
                <div class="label-box sm">Hero subtitle</div>
                <div class="btn-box">Button</div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-title label-box">Section Title</div>
            <div class="card-grid col-3">
                <div class="card">Card 01</div>
                <div class="card">Card 02</div>
                <div class="card">Card 03</div>
            </div>
        </div>
    </section>

    <section class="section bg-gray">
        <div class="container flex-row gap-lg">
            <div class="col-img placeholder">Image Area</div>
            <div class="col-text flex-col">
                <div class="label-box">Content Title</div>
                <div class="text-line"></div>
                <div class="text-line"></div>
                <div class="text-line sm"></div>
                <div class="btn-box">Button</div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-title label-box">Section Title</div>
            <div class="card-grid col-4">
                <div class="card sm">Card 01</div>
                <div class="card sm">Card 02</div>
                <div class="card sm">Card 03</div>
                <div class="card sm">Card 04</div>
            </div>
        </div>
    </section>

    <footer class="site-footer">
        <div class="container flex-between">
            <div class="label-box sm">Footer Logo</div>
            <div class="label-box sm">Copyright Text</div>
        </div>
    </footer>
</body>
</html>
