<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네비게이션바</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        a{
            text-decoration: none;
            color: #000;
        }
        .nav-bar{
            background: #fff;
            border-bottom: 1px solid #222;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo{
            font-size: 1.1rem;
            font-weight: 700;
            color: #111;
        }

        /* pc메뉴 */
        .menu{
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .menu a{
            font-size: 0.9rem;
            color: #444;
            transition: color 0.2s;
        }
        .menu a:hover{
            color: tomato;
        }

        /* 햄버거버튼 */
        .hamburger{
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger span{
            display: block;
            width: 24px;
            height: 24px;
            background: #111;
            transition: all 0.3s;
        }
        .hamburger.open span:nth-child(1) {transform: translateY(7px) rotate(45deg);}
        .hamburger.open span:nth-child(2) {opacity: 0;}
        .hamburger.open span:nth-child(3) {transform: translateY(-7px) rotate(-45deg);}
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a href="#" class="logo">MyPortfolio</a>

        <ul class="menu">
            <li><a href="#">home</a></li>
            <li><a href="#">home</a></li>
            <li><a href="#">home</a></li>
            <li><a href="#">home</a></li>
        </ul>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="mobile-menu" id="mobile-menu">
            <li><a href="#" onclick="closeMenu()">home</a></li>
            <li><a href="#" onclick="closeMenu()">home</a></li>
            <li><a href="#" onclick="closeMenu()">home</a></li>
            <li><a href="#" onclick="closeMenu()">home</a></li>
        </ul>
    </nav>

</body>
</html>
