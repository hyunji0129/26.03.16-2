<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갤러리 페이지</title>
    <link rel="stylesheet" href="style01.css">
</head>
<body>
    <nav class="menu-bar">
        <div class="logo">My Class</div>
        <ul class="menu-list">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>

    <main class="gallery-container">
        <article class="button">
            <button class="button-color">전체보기</button>
            <button class="button-color">강순이</button>
            <button class="button-color">강돌이</button>
        </article>
        <article class="card">
            <div class="card-photo"><img src="./photo.webp" alt="고양이 사진"></div>
            <h2 class="card-title">강순이</h2>
            <p class="card-info">귀염둥이 사고뭉치</p>
        </article>
        <article class="card">
            <div class="card-photo"><img src="./myphoto.webp" alt="고양이1"></div>
            <h2 class="card-title">강돌이</h2>
            <p class="card-info">씩씩한 곰탱이</p>
        </article>
        <article class="card">
            <div class="card-photo"><img src="./myphoto2.webp" alt="고양이2"></div>
            <h2 class="card-title">강뭉치</h2>
            <p class="card-info">애교쟁이 털뭉치</p>
        </article>
    </main>
</body>
</html>
