<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소개섹션</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .about{
            background: pink;
            padding: 80px 40px;
        }
        .about-inner{
            max-width: 700px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: center;
        }
        .about-img{
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            border-radius: 4px;
            display: block;
        }
        .about-tag{
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 16px;
        }
        .about-title{
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            font-weight: 700;
            line-height: 1.25;
        }
        .about-desc{
            color: #555;
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .skill-list{
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .skill-tag{
            font-size: 0.65rem;
            font-weight: 600;
            padding: 6px 14px;
            border: 1px solid #fff;
            border-radius: 10px;
            color: #444;
            letter-spacing: 0.04em;
            margin-bottom: 20px;
        }
        .about-btn{
            display: inline-block;
            padding: 12px 28px;
            background: #fff;
            color: #333;
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 600;
            border-radius: 4px;
            letter-spacing: 0.05rem;
            transition: background 0.2s;
        }
        .about-btn:hover{
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
        }
        @media (max-width: 768px) {
            .about{
                padding: 56px 24px;
            }
            .about-inner{
                grid-template-columns: 1fr;
                gap: 36px;
            }
            .about-img{
                aspect-ratio: 5 / 6;
                max-width: 400px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <section class="about">
        <div class="about-inner">
            <img class="about-img" src="./KakaoTalk_20251120_190156209.jpg" alt="profilePhoto">
            <div>
                <div class="about-tag">About Me</div>
                <h2 class="about-title">코드로 아이디어를<br/>현실로 만듭니다.</h2>
                <p class="about-desc">
                    안녕하세요. 저는 김현지 입니다<br/>
                    화이팅입니다!
                </p>

                <div class="skill-list">
                    <span class="skill-tag">HTML</span>
                    <span class="skill-tag">potoshop</span>
                    <span class="skill-tag">HTML</span>
                </div>

                <a href="#" class="about-btn">포트폴리오PDF다운로드</a>
            </div>
        </div>
    </section>
</body>
</html>
