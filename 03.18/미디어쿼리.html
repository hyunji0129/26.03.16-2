<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어쿼리</title>
    <style>
        .responsive-box {
            width: 100%;
            height: 200px;
            background-color: powderblue;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            transition: 0.5s;
        }

        @media (max-width: 768px) {
            /* 변경될 속성 */
            .responsive-box {
                background-color: pink;
                font-size: 16px;
                color: #fff;
            }
            .responsive-box::after {
                content: "(모바일모드)";
            }
        }
    </style>
</head>
<body>
    <div class="responsive-box">
        화면 너비를 줄이기
    </div>
</body>
</html>
