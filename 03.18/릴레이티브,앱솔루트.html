<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배치</title>
    <style>
        .test-card {
            width: 150px;
            height: 100px;
            background: pink;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .tag {
            position: absolute;
            top: -10px;
            right: -10px;
            background: skyblue;
            color: blue;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="test-card">
        <span class="tag">포지션</span>
        <p>포지션 연습</p>
    </div>
</body>
</html>
