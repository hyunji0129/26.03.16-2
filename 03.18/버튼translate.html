<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버튼</title>
    <style>
       .ani-btn {
        background-color: aqua;
        padding: 15px 30px;
        font-size: 18px;
        color: #fff;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
       }

       .ani-btn:hover {
        transform: scale(1.1) translateY(-5px);
        background-color: purple;
        color: yellow;
        /* box-shadow: 0 10px 20px #3333331a; */
       }
    </style>
</head>
<body>
    <button class="ani-btn">마우스호버효과</button>
</body>
</html>
